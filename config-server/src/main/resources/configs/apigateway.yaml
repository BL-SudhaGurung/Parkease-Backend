spring:
  application:
    name: apigateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth
          predicates:
            - Path=/api/v1/auth/**
        - id: parkinglot-service
          uri: lb://parkinglot
          predicates:
            - Path=/api/v1/lots/**
        - id: parkingspot-service
          uri: lb://parkingspot
          predicates:
            - Path=/api/v1/spots/**
        - id: booking-service
          uri: lb://booking
          predicates:
            - Path=/api/v1/bookings/**
        - id: vehicle-service
          uri: lb://vehicle
          predicates:
            - Path=/api/v1/vehicles/**
        - id: notification-service
          uri: lb://notification
          predicates:
            - Path=/api/v1/notifications/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

server:
  port: 8080