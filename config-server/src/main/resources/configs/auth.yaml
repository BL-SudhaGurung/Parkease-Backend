spring:
  application:
    name: auth

  datasource:
    url: jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            client-name: Google
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  logging:
    file :
       name: log/auth.log
    level:
      root: INFO
      org.springframework.security: DEBUG

server:
  port: 8081

jwt :
  secret: ${JWT_SECRET}
  expiration: ${EXPIRATION}        # 15 minutes
  refresh-expiration: ${REFRESH_EXPIRATION}   # 7 days
